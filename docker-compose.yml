services:
  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: ghcr.io/giji676/movies/nginx:${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/backend/movie/static/
      - ./nginx/production:/etc/nginx/conf.d
      - /media/downloads:/media/downloads
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - backend

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

  backend:
    image: ghcr.io/giji676/movies/backend:${IMAGE_TAG}
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    volumes:
      - static_volume:/app/backend/movie/static/
      - /media/downloads:/media/downloads
    expose:
      - 8000
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres:/docker-entrypoint-initdb.d
    env_file:
      - ./backend/.env.production

volumes:
  static_volume:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_conf:
